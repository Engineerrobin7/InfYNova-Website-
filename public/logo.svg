<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" role="img" aria-label="InfYNova logo">
  <rect width="500" height="140" rx="18" fill="#c7ff7a" />
  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b5cff" />
